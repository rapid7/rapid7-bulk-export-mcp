name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Zero permissions by default -- broadened per-job below.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version
        id: version
        run: echo "version=$(make version)" >> "$GITHUB_OUTPUT"

      - name: Verify versions are in sync
        run: make check-version

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb@2.1.2

      - name: Build release artifacts
        run: make package

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            *.mcpb
            rapid7-bulk-export-skill-${{ steps.version.outputs.version }}.zip

      #- name: Create GitHub release
      #  env:
      #    GH_TOKEN: ${{ github.token }}
      #  run: make create-release

  docker:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        run: echo "version=$(make version)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebf23d2de6d33a1cad7cd4c58e2 # v3.10.0

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: false
          tags: |
            rapid7/rapid7-bulk-export-mcp:latest
            rapid7/rapid7-bulk-export-mcp:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=keep
