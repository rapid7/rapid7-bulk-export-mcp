name: Release

on:
  push:
    branches: [main]

# Zero permissions by default -- broadened per-job below.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version
        id: version
        run: echo "version=$(make version)" >> "$GITHUB_OUTPUT"

      - name: Verify versions are in sync
        run: make check-version

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb@2.1.2

      - name: Build release artifacts
        run: make package

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            *.mcpb
            rapid7-bulk-export-skill-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: make create-release
